<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Syncore — Coming Soon</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@700;900&family=Barlow:wght@300;400;600&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg: #080c10;
    --cyan: #29b6f6;
    --cyan-glow: rgba(41,182,246,0.3);
    --text: #e8edf2;
    --muted: #4a5a6a;
    --border: #1a2230;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Barlow', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 40px 24px;
    overflow: hidden;
  }

  /* Grid background */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(41,182,246,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(41,182,246,0.03) 1px, transparent 1px);
    background-size: 48px 48px;
    pointer-events: none;
  }

  /* Glow */
  body::after {
    content: '';
    position: fixed;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    width: 600px;
    height: 600px;
    background: radial-gradient(circle, rgba(41,182,246,0.06) 0%, transparent 70%);
    pointer-events: none;
  }

  .wrap {
    position: relative;
    z-index: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0;
  }

  .logo {
    width: 80px;
    height: 80px;
    object-fit: contain;
    filter: drop-shadow(0 0 20px rgba(41,182,246,0.5));
    animation: float 6s ease-in-out infinite, fadeUp 0.8s ease both;
    margin-bottom: 28px;
  }

  @keyframes float {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-8px); }
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(16px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .eyebrow {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 4px;
    text-transform: uppercase;
    color: var(--cyan);
    margin-bottom: 14px;
    animation: fadeUp 0.8s ease 0.1s both;
  }

  h1 {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: clamp(56px, 12vw, 100px);
    font-weight: 900;
    text-transform: uppercase;
    letter-spacing: -1px;
    line-height: 0.95;
    color: #fff;
    margin-bottom: 20px;
    animation: fadeUp 0.8s ease 0.15s both;
  }

  h1 span { color: var(--cyan); }

  .sub {
    font-size: 16px;
    color: var(--muted);
    font-weight: 300;
    max-width: 380px;
    line-height: 1.6;
    margin-bottom: 40px;
    animation: fadeUp 0.8s ease 0.2s both;
  }

  .discord-btn {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    padding: 13px 28px;
    background: #5865f2;
    color: white;
    font-size: 14px;
    font-weight: 700;
    border-radius: 8px;
    text-decoration: none;
    letter-spacing: 0.3px;
    transition: all 0.2s;
    animation: fadeUp 0.8s ease 0.25s both;
    font-family: 'Barlow', sans-serif;
  }

  .discord-btn:hover {
    background: #6d78f5;
    box-shadow: 0 0 24px rgba(88,101,242,0.5);
    transform: translateY(-2px);
  }

  .footer-text {
    position: fixed;
    bottom: 24px;
    font-size: 12px;
    color: var(--muted);
    letter-spacing: 0.5px;
    opacity: 0.5;
  }
</style>
</head>
